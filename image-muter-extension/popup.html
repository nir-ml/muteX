<!DOCTYPE html>
<html>
<head>
  <title>Image Muter</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    button {
      margin: 5px;
      padding: 5px 10px;
    }
    img {
      max-width: 100%;
      margin: 5px 0;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>Image Muter</h2>
  <input type="file" id="imageInput" accept="image/*">
  <button id="uploadButton">Upload Image</button>
  <div id="imagePreview"></div>
  <button id="removeButton" style="display: none;">Remove</button>
  <div id="status">No images to scan or already scanning</div>
  <script src="popup.js"></script>
</body>
</html>
